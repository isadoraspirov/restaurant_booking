{% load static %}

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta
      name="description"
      content="A restaurant booking website offering a simple and convenient way to explore the menu, learn about the restaurant, and reserve a table online for any occasion."
    />

    <title>The Booking Table</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
      rel="stylesheet"
    />

    <!-- Favicons -->
    <link rel="icon" href="{% static 'images/favicon_io/favicon.ico' %}" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="{% static 'images/favicon_io/favicon-32x32.png' %}"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="{% static 'images/favicon_io/favicon-16x16.png' %}"
    />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  </head>

  <body class="d-flex flex-column min-vh-100">
    <!-- Navbar -->

    <nav id="navbar" class="navbar navbar-expand-lg fixed-top shadow-sm">
      <div class="container-fluid position-relative">
        <!-- Centered logo -->

        <a class="navbar-brand navbar-logo-centered" href="{% url 'home' %}">
          <img
            src="{% static 'images/logo.webp' %}"
            alt="The Booking Table"
            height="75"
          />
        </a>

        <!-- Hamburger button -->
        <button
          class="navbar-toggler ms-auto"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Collapsible menu -->
        <div
          class="collapse navbar-collapse justify-content-end"
          id="navbarNav"
        >
          <ul class="navbar-nav ms-auto align-items-center">
            <li class="nav-item">
              <a class="nav-link active" href="{% url 'home' %}"> Home </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="#menu"> Menu </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="#contact"> Contact </a>
            </li>

            <li class="nav-item ms-lg-3">
              <a
                href="{% url 'create_booking' %}"
                class="btn custom-button-filled"
              >
                Book now
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    {% if messages %}
    <div class="container mt-3">
      {% for message in messages %}
      <div class="alert alert-success alert-dismissible fade show" role="alert">
        {{ message }}
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
          aria-label="Close"
        ></button>
      </div>
      {% endfor %}
    </div>
    {% endif %} {% block content %} {% endblock %}

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="{% static 'js/main.js' %}"></script>

    <script src="{% static 'js/script.js' %}"></script>
  </body>
</html>
