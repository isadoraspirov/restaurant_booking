{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta
      name="description"
      content="A restaurant booking website offering a simple and convenient way to explore the menu, learn about the restaurant, and reserve a table online for any occasion."
    >

    <title>The Booking Table</title>

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'images/favicon_io/favicon-32x32.png' %}">

    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'images/favicon_io/favicon-16x16.png' %}">

    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    >

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="d-flex flex-column min-vh-100">

    <script src="{% static 'js/script.js' %}"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Font Awesome -->
    <script
      src="https://kit.fontawesome.com/030b39ca87.js"
      crossorigin="anonymous">
    </script>

    <!-- Navbar collapse JS -->
    <script>
      document
        .querySelectorAll(".navbar-collapse .nav-link")
        .forEach((link) => {
          link.addEventListener("click", function (e) {
            let section = document.querySelector(e.target.getAttribute("href"));

            if (section) {
              e.preventDefault();

              let navbarHeight =
                document.querySelector(".navbar-toggler").offsetHeight;

              window.scroll({
                top: section.offsetTop - navbarHeight,
                behavior: "smooth",
              });

              document
                .querySelector(".navbar-collapse")
                .classList.remove("show");
            }
          });
        });
    </script>

</body>
</html>
